name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Package Windows .exe
        run: go run fyne.io/tools/cmd/fyne@latest package -os windows -icon Icon.png

      - name: Zip artifact
        run: Compress-Archive -Path msn-converter.exe -DestinationPath msn-converter-${{ github.ref_name }}-windows-amd64.zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: msn-converter-${{ github.ref_name }}-windows-amd64.zip
          generate_release_notes: true
